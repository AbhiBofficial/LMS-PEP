spring.application.name=library-management-api

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Properties (bound via LibraryProperties)
library.jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
library.jwt.access-token-ttl=60m
library.jwt.refresh-token-ttl=7d

# Library Business Rules
library.max-borrowed-books=5
library.loan-days=14
library.fine-per-late-day=2.00

server.port=8080
