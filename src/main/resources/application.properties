spring.application.name=library-management-api

# PostgreSQL Connection (uses env vars in production, defaults for local dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/library_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}

# JWT Properties (bound via LibraryProperties)
library.jwt.secret=${LIBRARY_JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
library.jwt.access-token-ttl=${LIBRARY_JWT_ACCESS_TOKEN_TTL:60m}
library.jwt.refresh-token-ttl=${LIBRARY_JWT_REFRESH_TOKEN_TTL:7d}

# Library Business Rules
library.max-borrowed-books=${LIBRARY_MAX_BORROWED_BOOKS:5}
library.loan-days=${LIBRARY_LOAN_DAYS:14}
library.fine-per-late-day=${LIBRARY_FINE_PER_LATE_DAY:2.00}

server.port=${PORT:8080}
