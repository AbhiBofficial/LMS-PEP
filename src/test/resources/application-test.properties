spring.datasource.url=jdbc:h2:mem:lms_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
spring.cache.type=simple
library.max-borrowed-books=5
library.loan-days=14
library.fine-per-late-day=2.00
library.jwt.secret=test-secret-test-secret-test-secret-test-secret-test-secret-test-secret-64
library.jwt.access-token-ttl=15m
library.jwt.refresh-token-ttl=7d
logging.level.com.example.library=OFF
logging.level.root=WARN
spring.main.banner-mode=off
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
